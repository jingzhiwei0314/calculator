# Flutter CI：Web、Android APK、iOS 未签名 IPA（供爱思助手等工具自行签名）。
#
# iOS：不在 GitHub 上使用 Apple 证书；产物为「未签名 IPA」结构（Payload/Runner.app），
# 下载后在 Windows 上用爱思助手导入并自签名安装。
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analyze-test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release

  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: blue_cute_calculator/build/app/outputs/flutter-apk/app-release.apk

  # 未签名 IPA：爱思助手「导入 IPA / 签名」使用（无需仓库里配置 Apple Secrets）。
  ios-unsigned-ipa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter precache --ios

      - name: CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Pack unsigned IPA for 爱思助手
        run: |
          set -e
          ROOT="$PWD"
          APP=""
          for candidate in "build/ios/iphoneos/Runner.app" "build/ios/Release-iphoneos/Runner.app"; do
            if [ -d "$candidate" ]; then APP="$candidate"; break; fi
          done
          if [ -z "$APP" ]; then
            APP=$(find build/ios -maxdepth 6 -name "Runner.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::找不到 Runner.app，请查看 Flutter 输出目录是否变更"
            find build/ios -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "Using APP=$APP"
          STAGE="$RUNNER_TEMP/ipa_stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Payload"
          cp -R "$APP" "$STAGE/Payload/"
          cd "$STAGE"
          zip -qry "$ROOT/unsigned-for-aisi.ipa" Payload
          ls -la "$ROOT/unsigned-for-aisi.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-for-aisi
          path: blue_cute_calculator/unsigned-for-aisi.ipa
