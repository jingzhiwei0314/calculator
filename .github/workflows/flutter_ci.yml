# Flutter CI：Web、Android APK、iOS 无签名编译校验、带签名的 IPA。
#
# IPA 需在仓库 Settings → Secrets and variables → Actions 中配置（Repository secrets）：
#   APPLE_CERTIFICATE_BASE64      — 分发或开发用 .p12 的 Base64
#   APPLE_CERTIFICATE_PASSWORD    — .p12 密码
#   APPLE_PROVISION_PROFILE_BASE64 — 与 Bundle ID 匹配的 .mobileprovision 的 Base64
#   APPLE_PROVISIONING_PROFILE_NAME — 描述文件在 Apple 开发者站点的「名称」(Provisioning Profile Name)
#   APPLE_TEAM_ID                 — 10 位 Team ID
#   APPLE_KEYCHAIN_PASSWORD       — 可选；临时钥匙串密码，不填则随机生成
#   APPLE_EXPORT_METHOD           — 可选；app-store | ad-hoc | enterprise | development，默认 ad-hoc
#
# Base64 示例（本机）:
#   base64 -i cert.p12 | pbcopy
#   base64 -i profile.mobileprovision | pbcopy
#
# 当前 Bundle ID：com.example.blueCuteCalculator（上架前请改为你在开发者账号中注册的 ID）。
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  analyze-test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release

  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: blue_cute_calculator/build/app/outputs/flutter-apk/app-release.apk

  # 不依赖证书：验证 iOS 工程可在 Xcode 链路下完成 Release 编译。
  ios-build-nosign:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get

      - name: CocoaPods
        run: |
          cd ios
          pod install

      - run: flutter build ios --release --no-codesign

  # 需要上方列出的 Apple 密钥；未配置时本 job 会失败并提示。
  build-ipa:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Check Apple signing secrets
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing() { echo "::error::缺少 GitHub Secret: $1（见本 workflow 文件顶部说明）"; }
          test -n "$APPLE_CERTIFICATE_BASE64" || { missing APPLE_CERTIFICATE_BASE64; exit 1; }
          test -n "$APPLE_CERTIFICATE_PASSWORD" || { missing APPLE_CERTIFICATE_PASSWORD; exit 1; }
          test -n "$APPLE_PROVISION_PROFILE_BASE64" || { missing APPLE_PROVISION_PROFILE_BASE64; exit 1; }
          test -n "$APPLE_PROVISIONING_PROFILE_NAME" || { missing APPLE_PROVISIONING_PROFILE_NAME; exit 1; }
          test -n "$APPLE_TEAM_ID" || { missing APPLE_TEAM_ID; exit 1; }

      - run: flutter pub get

      - name: CocoaPods
        run: |
          cd ios
          pod install

      - name: Import to keychain and install profile
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISION_PROFILE_BASE64: ${{ secrets.APPLE_PROVISION_PROFILE_BASE64 }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -e
          KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-$(openssl rand -base64 24)}"
          CERT_PATH="$RUNNER_TEMP/signing.p12"
          PP_PATH="$RUNNER_TEMP/app.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          python3 -c "import base64,os,pathlib; p='$CERT_PATH'; pathlib.Path(p).write_bytes(base64.standard_b64decode(os.environ['APPLE_CERTIFICATE_BASE64'].strip()))"
          python3 -c "import base64,os,pathlib; p='$PP_PATH'; pathlib.Path(p).write_bytes(base64.standard_b64decode(os.environ['APPLE_PROVISION_PROFILE_BASE64'].strip()))"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_PLIST=$(mktemp)
          security cms -D -i "$PP_PATH" > "$PP_PLIST"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PP_PLIST")
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

      - name: Write ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
          APPLE_EXPORT_METHOD: ${{ secrets.APPLE_EXPORT_METHOD }}
        run: |
          python3 << 'PY'
          import os
          import plistlib

          method = (os.environ.get("APPLE_EXPORT_METHOD") or "ad-hoc").strip()
          data = {
              "method": method,
              "teamID": os.environ["APPLE_TEAM_ID"],
              "signingStyle": "manual",
              "provisioningProfiles": {
                  "com.example.blueCuteCalculator": os.environ["APPLE_PROVISIONING_PROFILE_NAME"],
              },
          }
          with open("ios/ExportOptionsCI.plist", "wb") as f:
              plistlib.dump(data, f, fmt=plistlib.FMT_XML)
          PY

      - name: Build IPA
        run: |
          flutter build ipa --release --export-options-plist=ios/ExportOptionsCI.plist

      - uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: blue_cute_calculator/build/ios/ipa/*.ipa
