# 在 GitHub 上拉依赖、静态分析、测试并编译（Web + Android APK）。
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release

  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: blue_cute_calculator/build/app/outputs/flutter-apk/app-release.apk
