# 默认：push / PR 仅编译 iOS 未签名 IPA（爱思助手自签）。
# 手动运行（Actions → Flutter CI → Run workflow）可勾选是否额外编译 APK、Web 与分析测试。
name: Flutter CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_ios_ipa:
        description: 编译 iOS 未签名 IPA（unsigned-ipa-for-aisi）
        type: boolean
        default: true
      build_apk:
        description: 编译 Android release APK
        type: boolean
        default: false
      web_analyze_test:
        description: flutter analyze、test、build web
        type: boolean
        default: false

jobs:
  # 仅在工作流手动触发且勾选时运行
  analyze-test-web:
    if: github.event_name == 'workflow_dispatch' && inputs.web_analyze_test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build web --release

  build-apk:
    if: github.event_name == 'workflow_dispatch' && inputs.build_apk
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: blue_cute_calculator/build/app/outputs/flutter-apk/app-release.apk

  ios-unsigned-ipa:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.build_ios_ipa)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: blue_cute_calculator
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter precache --ios

      - name: CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Pack unsigned IPA for 爱思助手
        run: |
          set -e
          ROOT="$PWD"
          APP=""
          for candidate in "build/ios/iphoneos/Runner.app" "build/ios/Release-iphoneos/Runner.app"; do
            if [ -d "$candidate" ]; then APP="$candidate"; break; fi
          done
          if [ -z "$APP" ]; then
            APP=$(find build/ios -maxdepth 6 -name "Runner.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::找不到 Runner.app，请查看 Flutter 输出目录是否变更"
            find build/ios -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi
          echo "Using APP=$APP"
          STAGE="$RUNNER_TEMP/ipa_stage"
          rm -rf "$STAGE"
          mkdir -p "$STAGE/Payload"
          cp -R "$APP" "$STAGE/Payload/"
          cd "$STAGE"
          zip -qry "$ROOT/unsigned-for-aisi.ipa" Payload
          ls -la "$ROOT/unsigned-for-aisi.ipa"

      - uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa-for-aisi
          path: blue_cute_calculator/unsigned-for-aisi.ipa
